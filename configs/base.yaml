experiment_name: base
seed: 42

model:
  in_channels: 4
  num_classes: 3
  pretrained: true
  encoder_name: swin_tiny_patch4_window7_224
  decoder_name: unetpp
  use_attention: false
  deep_supervision: true

data:
  train_manifest: ./manifests/train.json
  val_manifest: ./manifests/val.json
  patch_size: [128, 128, 128]
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 2

reproducibility:
  deterministic: false
  use_deterministic_algorithms: false

augment:
  intensity_prob: 0.8
  gaussian_noise_prob: 0.5
  channel_dropout_prob: 0.16
  flip_prob: 0.8

training:
  epochs: 200
  batch_size: 3
  amp: true
  grad_clip: 1.0

optim:
  encoder_lr: 1.0e-4
  decoder_lr: 2.0e-4
  weight_decay: 1.0e-4

scheduler:
  warmup_epochs: 5
  eta_min: 1.0e-6

metrics:
  compute_hd95: true

logging:
  use_wandb: true
  project: brats-segmentation
  mode: online

output:
  dir: ./outputs
